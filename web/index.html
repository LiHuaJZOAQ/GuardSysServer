<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuardSys 监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: #f5f7fa; }
      .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
      .sensor-value { font-size: 2rem; font-weight: bold; color: #333; }
      .sensor-unit { font-size: 1rem; color: #666; }
      .status-online { color: #28a745; }
      .status-offline { color: #dc3545; }
      .alarm-normal { border-left: 4px solid #28a745; }
      .alarm-warning { border-left: 4px solid #ffc107; }
      .alarm-danger { border-left: 4px solid #dc3545; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
