name: Test

on:
  push:
    branches: [main]
    paths: ['server/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: |
          node index.js &
          sleep 2
          node test.js
          status=$?
          kill %1 2>/dev/null
          exit $status
